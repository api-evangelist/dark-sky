apis:
  - name: Dark Sky Forecast API
    description: >
      Returns the current weather conditions and forecasts for a given
      latitude/longitude, including current observations, minute-by-minute
      precipitation for the next hour, hourly data for the next 48 hours,
      and daily summaries for the next 7 days.
