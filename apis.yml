aid: dark-sky
name: Dark Sky
description: >
  Dark Sky is a hyperlocal weather forecast REST API (now part of Apple)
  that provided minute-by-minute precipitation forecasts, hourly weather
  conditions, and multi-day outlooks powered by machine-learning models.
  The API delivered real-time and historical weather data for any latitude
  and longitude worldwide, including current conditions, 60-minute
  minutely precipitation intensity, 48-hour hourly forecasts, and 7-day
  daily summaries. It was acquired by Apple in March 2020; new developer
  signups closed immediately, and the API was permanently shut down on
  March 31, 2023. Apple's WeatherKit REST API is the successor service.
